<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaflet GeoJSON Example</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin=""></script>
    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        var map = L.map('map');

        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
        }).addTo(map);

        // Locations as a GeoJSON FeatureCollection
        var locationsGeoJSON = {
            "type": "FeatureCollection",
            "features": [
                {
                    "type": "Feature",
                    "properties": { "address": "4611 West Adams",      "city": "Lincoln",         "state": "NE", "group": "NE" },
                    "geometry": { "type": "Point", "coordinates": [-96.7270, 40.8260] }
                },
                {
                    "type": "Feature",
                    "properties": { "address": "84198 562nd Ave",       "city": "Stanton",         "state": "NE", "group": "NE" },
                    "geometry": { "type": "Point", "coordinates": [-97.2260, 41.9500] }
                },
                {
                    "type": "Feature",
                    "properties": { "address": "80025 463rd Ave",       "city": "Arcadia",         "state": "NE", "group": "NE" },
                    "geometry": { "type": "Point", "coordinates": [-99.1340, 41.4180] }
                },
                {
                    "type": "Feature",
                    "properties": { "address": "1003 Iowa Ave",         "city": "College Springs", "state": "IA", "group": "IA" },
                    "geometry": { "type": "Point", "coordinates": [-95.1180, 40.6230] }
                },
                {
                    "type": "Feature",
                    "properties": { "address": "4375 Pierce Ave",       "city": "Paullina",        "state": "IA", "group": "IA" },
                    "geometry": { "type": "Point", "coordinates": [-95.6880, 42.9780] }
                },
                {
                    "type": "Feature",
                    "properties": { "address": "4625 Wyoming Blvd NE",  "city": "Albuquerque",     "state": "NM", "group": "NM" },
                    "geometry": { "type": "Point", "coordinates": [-106.5554, 35.1107] }
                },
                {
                    "type": "Feature",
                    "properties": { "address": "1090 S St Francis Dr",  "city": "Santa Fe",        "state": "NM", "group": "NM" },
                    "geometry": { "type": "Point", "coordinates": [-105.9600, 35.6672] }
                }
            ]
        };

        // Lines connecting locations within each state
        var stateLines = {
            "type": "FeatureCollection",
            "features": [
                {
                    "type": "Feature",
                    "properties": { "group": "NE" },
                    "geometry": {
                        "type": "LineString",
                        "coordinates": [[-96.7270, 40.8260], [-97.2260, 41.9500], [-99.1340, 41.4180]]
                    }
                },
                {
                    "type": "Feature",
                    "properties": { "group": "IA" },
                    "geometry": {
                        "type": "LineString",
                        "coordinates": [[-95.1180, 40.6230], [-95.6880, 42.9780]]
                    }
                },
                {
                    "type": "Feature",
                    "properties": { "group": "NM" },
                    "geometry": {
                        "type": "LineString",
                        "coordinates": [[-106.5554, 35.1107], [-105.9600, 35.6672]]
                    }
                }
            ]
        };

        // Color map per state group
        var groupColors = { NE: '#3388ff', IA: '#33cc66', NM: '#ff3333' };

        // Style lines by state
        L.geoJSON(stateLines, {
            style: function(feature) {
                return {
                    color: groupColors[feature.properties.group],
                    weight: 3,
                    opacity: 0.6,
                    dashArray: '8'
                };
            }
        }).addTo(map);

        // Render points as circle markers with popups
        var geoLayer = L.geoJSON(locationsGeoJSON, {
            pointToLayer: function(feature, latlng) {
                return L.circleMarker(latlng, {
                    radius: 10,
                    fillColor: groupColors[feature.properties.group],
                    color: '#fff',
                    weight: 2,
                    opacity: 1,
                    fillOpacity: 0.85
                });
            },
            onEachFeature: function(feature, layer) {
                var p = feature.properties;
                layer.bindPopup('<b>' + p.address + '</b><br>' + p.city + ', ' + p.state);
            }
        }).addTo(map);

        map.fitBounds(geoLayer.getBounds().pad(0.2));
    </script>
</body>
</html>
